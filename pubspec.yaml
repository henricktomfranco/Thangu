name: thangu

description: AI-based finance manager app that reads SMS and categorizes transactions

publish_to: 'none'

version: 1.0.4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  sqflite: ^2.3.0
  intl: ^0.17.0
  fl_chart: ^0.66.0
  flutter_svg: ^2.0.5
  path: ^1.8.3
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/